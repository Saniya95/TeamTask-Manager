<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Team Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- AUTHENTICATION VIEW -->
    <div id="auth-view" class="auth-container">
        <div class="auth-box glass">
            <h2 id="auth-title">Welcome to Nexus</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to manage your tasks</p>
            
            <form id="auth-form">
                <input type="text" id="auth-name" placeholder="Full Name" class="hidden">
                <input type="email" id="auth-email" placeholder="Email Address" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <select id="auth-role" class="hidden">
                    <option value="member">Team Member</option>
                    <option value="admin">Project Admin</option>
                </select>
                <button type="submit" id="auth-btn" style="width: 100%">Sign In</button>
            </form>
            
            <div class="toggle-text">
                <span id="toggle-auth">Don't have an account? Sign up</span>
            </div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="container hidden">
        <nav class="glass">
            <div class="logo">Nexus.</div>
            <div class="user-info">
                <span id="user-greeting">Hello, User</span>
                <span id="user-role-badge" class="badge">Role</span>
                <button id="logout-btn" class="outline" style="padding: 0.5rem 1rem;">Logout</button>
            </div>
        </nav>

        <div class="dashboard-grid">
            <div class="stat-card glass">
                <h3>Total Tasks</h3>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Pending</h3>
                <div class="value" id="stat-pending" style="color: var(--warning)">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Completed</h3>
                <div class="value" id="stat-completed" style="color: var(--success)">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Overdue</h3>
                <div class="value" id="stat-overdue" style="color: var(--danger)">0</div>
            </div>
        </div>

        <div class="main-content">
            <!-- Projects Section -->
            <div class="section glass">
                <div class="section-header">
                    <h2>Projects</h2>
                    <button id="new-project-btn" class="admin-only hidden">+ New Project</button>
                </div>
                <div class="task-list" id="projects-list">
                    <!-- Project items will be injected here -->
                </div>
            </div>

            <!-- Tasks Section -->
            <div class="section glass">
                <div class="section-header">
                    <h2>My Tasks</h2>
                    <button id="new-task-btn" class="admin-only hidden">+ Assign Task</button>
                </div>
                <div class="task-list" id="tasks-list">
                    <!-- Task items will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- New Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-content glass">
            <button class="close-modal">&times;</button>
            <h2>Create New Project</h2>
            <form id="project-form">
                <input type="text" id="proj-name" placeholder="Project Name" required>
                <textarea id="proj-desc" placeholder="Project Description" rows="3"></textarea>
                <button type="submit" style="width: 100%">Create Project</button>
            </form>
        </div>
    </div>

    <!-- New Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content glass">
            <button class="close-modal">&times;</button>
            <h2>Assign New Task</h2>
            <form id="task-form">
                <input type="text" id="task-title" placeholder="Task Title" required>
                <textarea id="task-desc" placeholder="Task Description" rows="2"></textarea>
                <select id="task-project" required>
                    <option value="" disabled selected>Select Project</option>
                </select>
                <select id="task-assignee">
                    <option value="">Unassigned</option>
                </select>
                <input type="date" id="task-due" required>
                <button type="submit" style="width: 100%">Assign Task</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
